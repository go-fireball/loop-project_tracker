id: ITEM-0008
title: Document local setup and verification workflow
goal: "Add concise project-local documentation under `apps/project-tracker/` covering Django setup, test commands, and the known workspace limitation blocking runtime verification."
status: in_progress
owner_role: DEV
related_files:
  - apps/project-tracker/README.md
  - apps/project-tracker/manage.py
  - apps/project-tracker/project_tracker/settings.py
acceptance_criteria:
  - "A project-local README or equivalent doc is added under `apps/project-tracker/` with concrete setup steps for creating a Python environment, installing Django, applying migrations, and running the development server."
  - "The documentation lists the focused verification commands for `py_compile` and the Django test modules currently used by the project."
  - "The known workspace limitation is documented explicitly as `ModuleNotFoundError: No module named 'django'`, framed as an environment/setup issue rather than a tracker application defect."
  - "The documentation stays aligned with the locked stack: Django, SQLite, and vanilla HTML/CSS/JS only."
done_definition:
  - "The new documentation reflects the current repository layout and existing `manage.py` entrypoint without inventing new tooling."
  - "The listed commands are specific enough for a fresh local checkout to reproduce migrations, server startup, and focused test execution once Django is installed."
  - "If DEV cannot run Django commands in the workspace, the handoff and review artifacts keep that runtime limitation visible."
