items:
  - id: ITEM-0001
    title: Scaffold Django project tracker baseline
    goal: Establish the single-project Django skeleton under `apps/project-tracker/` with the tracker app wired into settings, URLs, templates, and static assets.
    type: feature
    status: in_progress
    priority: high
    dependencies: []
    notes:
      - Keep one Django project with one main `tracker` app.
      - Create the baseline file structure for settings, root URLs, app URLs, templates, and static assets.
      - Include a base template and shared asset wiring that later CRUD pages can extend.
  - id: ITEM-0002
    title: Implement tracker domain models and forms
    goal: Add `Project`, `Task`, and `Tag` models, related forms, admin registration, and database migrations that match the approved domain surface.
    type: feature
    status: todo
    priority: high
    dependencies:
      - ITEM-0001
    notes:
      - Use direct Django ORM relationships, including tag many-to-many links for both projects and tasks.
      - Keep validation in models and forms rather than introducing service layers.
  - id: ITEM-0003
    title: Build server-rendered tracker pages
    goal: Deliver dashboard, project list, project detail with tasks, and tag detail pages using Django views, templates, and SQLite-backed aggregates.
    type: feature
    status: todo
    priority: high
    dependencies:
      - ITEM-0002
    notes:
      - Dashboard must show total projects, tasks by status, and overdue tasks.
      - Prefer server-rendered templates and partial-ready template composition.
  - id: ITEM-0004
    title: Add no-reload CRUD interactions
    goal: Implement async create, update, and delete flows for projects, tasks, and tags using HTML partial responses and small vanilla JS fetch handlers.
    type: feature
    status: todo
    priority: high
    dependencies:
      - ITEM-0003
    notes:
      - Default mutation responses to HTML partials.
      - Use JSON only for narrow cases where partial HTML is awkward.
  - id: ITEM-0005
    title: Add automated coverage and final validation
    goal: Cover the tracker with Django tests for models, views, and no-reload mutation behavior, then validate the full acceptance path.
    type: feature
    status: todo
    priority: medium
    dependencies:
      - ITEM-0004
    notes:
      - Focus tests on domain rules, page rendering, and async CRUD behavior.
      - Keep tooling inside Django and the Python standard library only.
